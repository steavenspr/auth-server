name: CI/CD TP4

on:
  push:
    branches: [ main, feature/tp4-auth-masterkey ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test with Maven (H2, Master Key)
        run: mvn clean verify
        env:
          APP_MASTER_KEY: test_master_key_for_ci_only

      - name: SonarCloud Analysis
        run: mvn sonar:sonar -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} -Dsonar.host.url=https://sonarcloud.io
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          APP_MASTER_KEY: test_master_key_for_ci_only

      - name: Afficher la branche courante
        run: git branch --show-current

      - name: Analyse de la branche TP4
        if: github.ref == 'refs/heads/feature/tp4-auth-masterkey'
        run: echo "Analyse spécifique pour la branche TP4 : ${{ github.ref }}"

