name: SonarCloud Analysis

on:
  push:
    branches: [ main, feature/tp3-hmac-authentication ]

jobs:
  sonar:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: auth_db_tp3
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run tests and generate JaCoCo report
        env:
          SMK_SECRET: ${{ secrets.SMK_SECRET }} 
        run: mvn -B verify

      - name: Analyze with SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SMK_SECRET: ${{ secrets.SMK_SECRET }}
        run: |
          mvn -B sonar:sonar \
            -Dsonar.projectKey=steavenspr_auth-server-tp2 \
            -Dsonar.organization=steavenspr \
            -Dsonar.host.url=https://sonarcloud.io
